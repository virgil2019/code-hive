name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Move electron to devDependencies for packaging
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf-8'));
          if (pkg.dependencies?.electron) {
            pkg.devDependencies = pkg.devDependencies || {};
            pkg.devDependencies.electron = pkg.dependencies.electron;
            delete pkg.dependencies.electron;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          }
          "

      - name: Build macOS app (arm64)
        run: npx electron-builder --mac dmg zip --arm64 -p never

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*-mac.zip
          generate_release_notes: true
