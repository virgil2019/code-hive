<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Hive</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1a1a1a;
      -webkit-app-region: drag;
      user-select: none;
      overflow: hidden;
      height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.3px;
    }

    .header .badge {
      background: linear-gradient(135deg, #f5a623, #e8912d);
      color: #000;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      letter-spacing: 0.2px;
    }

    .section-label {
      padding: 10px 16px 4px;
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      flex-shrink: 0;
    }

    #activeSection {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    #sessionList {
      flex: 1;
      overflow-y: auto;
      -webkit-app-region: no-drag;
    }

    .empty {
      padding: 32px 16px;
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
    }

    .session {
      display: flex;
      align-items: center;
      padding: 9px 16px;
      -webkit-app-region: no-drag;
      transition: all 0.2s ease;
    }

    .session.clickable { cursor: pointer; }
    .session.clickable:hover {
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
    }
    .session.clickable:active {
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
    }

    .session .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 10px;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .dot.working {
      background: #34d399;
      box-shadow: 0 0 6px rgba(52,211,153,0.5);
      animation: glow-green 2s ease-in-out infinite;
    }
    .dot.waiting {
      background: #fbbf24;
      box-shadow: 0 0 6px rgba(251,191,36,0.5);
      animation: pulse 1.5s ease-in-out infinite;
    }
    .dot.stopped { background: rgba(255,255,255,0.25); }
    .dot.stopped-new {
      background: #60a5fa;
      box-shadow: 0 0 6px rgba(96,165,250,0.5);
      animation: pulse 1.5s ease-in-out infinite;
    }
    .dot.done { background: rgba(255,255,255,0.12); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }

    @keyframes glow-green {
      0%, 100% { box-shadow: 0 0 4px rgba(52,211,153,0.3); }
      50% { box-shadow: 0 0 10px rgba(52,211,153,0.6); }
    }

    .session .info { flex: 1; min-width: 0; }

    .session .info .name {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session .info .detail {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session .info .path {
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session .right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      flex-shrink: 0;
      margin-left: 8px;
      gap: 3px;
    }

    .status-tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 6px;
      font-weight: 600;
      letter-spacing: 0.2px;
      transition: all 0.3s ease;
    }

    .status-tag.working {
      background: rgba(52,211,153,0.15);
      color: #34d399;
    }
    .status-tag.waiting {
      background: rgba(251,191,36,0.15);
      color: #fbbf24;
    }
    .status-tag.stopped {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.35);
    }
    .status-tag.stopped-new {
      background: rgba(96,165,250,0.15);
      color: #60a5fa;
    }
    .status-tag.done {
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.2);
    }

    .jump-tag {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      transition: color 0.2s;
    }
    .jump-tag.can-jump { color: rgba(96,165,250,0.7); }
    .session.clickable:hover .jump-tag.can-jump { color: #60a5fa; }

    .footer {
      padding: 8px 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: center;
      gap: 16px;
      position: relative;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    .footer a, .footer-toggle {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      -webkit-app-region: no-drag;
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer a:hover, .footer-toggle:hover { color: rgba(255,255,255,0.8); }

    .history-dropdown {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding-bottom: 28px;
      margin: 0 8px;
    }
    .history-dropdown.open { display: block; }

    .history-dropdown-inner {
      background: rgba(30,30,30,0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      max-height: 192px;
      overflow-y: auto;
      box-shadow: 0 -8px 24px rgba(0,0,0,0.4);
    }

    .history-item {
      display: flex;
      align-items: center;
      padding: 7px 12px;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: background 0.15s;
      border-radius: 4px;
      margin: 1px 4px;
    }
    .history-item:hover { background: rgba(255,255,255,0.08); }

    .history-item .hi-name {
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      font-weight: 500;
      margin-right: 8px;
      white-space: nowrap;
    }
    .history-item .hi-path {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-item .hi-time {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      margin-left: 8px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Code Hive</h1>
    <span class="badge" id="waitingBadge" style="display:none"></span>
  </div>

  <div id="activeSection">
    <div class="section-label">Active Sessions</div>
    <div id="sessionList"></div>
  </div>

  <div class="footer">
    <div id="historySection" style="display:none">
      <a class="footer-toggle" id="historyToggle">Recent ▸</a>
      <div id="historyList" class="history-dropdown"></div>
    </div>
    <a id="refreshBtn">Refresh</a>
  </div>

  <script>
    function timeAgo(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return "just now";
      if (mins < 60) return mins + "m";
      const hours = Math.floor(mins / 60);
      if (hours < 24) return hours + "h" + (mins % 60 > 0 ? (mins % 60) + "m" : "");
      return Math.floor(hours / 24) + "d ago";
    }

    function shortPath(fullPath) {
      return fullPath.replace(/^\/Users\/[^/]+/, "~");
    }

    // Safe DOM element creation (no innerHTML XSS)
    function el(tag, attrs, ...children) {
      const e = document.createElement(tag);
      if (attrs) {
        for (const [k, v] of Object.entries(attrs)) {
          if (k === "className") e.className = v;
          else if (k.startsWith("on") && typeof v === "function") e.addEventListener(k.slice(2), v);
          else e.setAttribute(k, v);
        }
      }
      for (const c of children) {
        if (typeof c === "string") e.appendChild(document.createTextNode(c));
        else if (c) e.appendChild(c);
      }
      return e;
    }

    function renderSession(s) {
      const isNewStopped = s.status === "stopped" && !s.acknowledged;
      const dotClass = isNewStopped ? "stopped-new" : s.status;
      const tagClass = isNewStopped ? "stopped-new" : s.status;
      const tagText = isNewStopped ? "Finished"
        : { working: "Working", waiting: "Waiting", stopped: "Stopped", done: "Done" }[s.status] || s.status;

      const dur = timeAgo(s.startedAt);
      const detail = s.waitReason === "permission_prompt"
        ? s.tool + " · Needs approval"
        : isNewStopped
        ? s.tool + " · Just finished"
        : s.tool + " · " + dur;

      const hasTty = !!s.tty;
      const clickable = hasTty || isNewStopped;

      const onClick = clickable ? () => {
        if (isNewStopped && hasTty) {
          window.hive.acknowledge(s.id).then(() => window.hive.openProject(s.project, s.tty));
        } else if (hasTty) {
          window.hive.openProject(s.project, s.tty);
        } else if (isNewStopped) {
          window.hive.acknowledge(s.id);
        }
      } : null;

      return el("div", { className: "session" + (clickable ? " clickable" : ""), ...(onClick ? { onclick: onClick } : {}) },
        el("div", { className: "dot " + dotClass }),
        el("div", { className: "info" },
          el("div", { className: "name" }, s.projectName),
          el("div", { className: "detail" }, detail),
          el("div", { className: "path" }, shortPath(s.project))
        ),
        el("div", { className: "right" },
          el("span", { className: "status-tag " + tagClass }, tagText),
          hasTty
            ? el("span", { className: "jump-tag can-jump" }, "↗ Jump")
            : el("span", { className: "jump-tag" }, "Cannot locate")
        )
      );
    }

    function renderHistoryItem(s) {
      return el("div", { className: "history-item", onclick: () => window.hive.openProject(s.project) },
        el("span", { className: "hi-name" }, s.projectName),
        el("span", { className: "hi-path" }, shortPath(s.project)),
        el("span", { className: "hi-time" }, timeAgo(s.lastActivity))
      );
    }

    // Track current display order to avoid re-sorting during live updates
    let currentOrder = []; // array of session IDs in display order

    function sortKey(s) {
      if (s.status === "waiting") return 0;
      if (s.status === "stopped" && !s.acknowledged) return 1;
      if (s.status === "working") return 2;
      if (s.status === "stopped") return 3;
      return 4;
    }

    function fullSort(a, b) {
      const keyDiff = sortKey(a) - sortKey(b);
      if (keyDiff !== 0) return keyDiff;
      // Same priority: most recently active first
      return new Date(b.lastActivity).getTime() - new Date(a.lastActivity).getTime();
    }

    function render(data, forceSort) {
      const { sessions, history } = data;
      const sessionMap = Object.fromEntries(sessions.map(s => [s.id, s]));

      let ordered;
      if (forceSort || currentOrder.length === 0) {
        // Full sort: on first render, panel open, or refresh
        sessions.sort(fullSort);
        ordered = sessions;
      } else {
        // Stable update: keep existing order, append new sessions at sorted position
        const existing = currentOrder
          .filter(id => sessionMap[id])
          .map(id => sessionMap[id]);
        const newSessions = sessions
          .filter(s => !currentOrder.includes(s.id))
          .sort((a, b) => sortKey(a) - sortKey(b));
        // Insert new sessions at correct positions
        ordered = [...existing];
        for (const ns of newSessions) {
          const nsKey = sortKey(ns);
          let inserted = false;
          for (let i = 0; i < ordered.length; i++) {
            if (nsKey < sortKey(ordered[i])) {
              ordered.splice(i, 0, ns);
              inserted = true;
              break;
            }
          }
          if (!inserted) ordered.push(ns);
        }
      }

      currentOrder = ordered.map(s => s.id);

      const listEl = document.getElementById("sessionList");
      const historyEl = document.getElementById("historyList");
      const historySec = document.getElementById("historySection");
      const badge = document.getElementById("waitingBadge");

      listEl.replaceChildren();
      if (ordered.length === 0) {
        listEl.appendChild(el("div", { className: "empty" }, "No active sessions"));
      } else {
        ordered.forEach(s => listEl.appendChild(renderSession(s)));
      }

      const waitingCount = sessions.filter(s => s.status === "waiting").length;
      const newStoppedCount = sessions.filter(s => s.status === "stopped" && !s.acknowledged).length;
      const attentionCount = waitingCount + newStoppedCount;
      if (attentionCount > 0) {
        const parts = [];
        if (waitingCount > 0) parts.push(waitingCount + " waiting");
        if (newStoppedCount > 0) parts.push(newStoppedCount + " finished");
        badge.textContent = parts.join(", ");
        badge.style.display = "inline";
      } else {
        badge.style.display = "none";
      }

      if (history && history.length > 0) {
        historySec.style.display = "block";
        historyEl.replaceChildren();
        const inner = el("div", { className: "history-dropdown-inner" });
        history.forEach(s => inner.appendChild(renderHistoryItem(s)));
        historyEl.appendChild(inner);
      } else {
        historySec.style.display = "none";
      }
    }

    // Recent: hover to show, leave to hide
    const historySec = document.getElementById("historySection");
    const historyList = document.getElementById("historyList");
    const historyToggle = document.getElementById("historyToggle");

    let hideTimer = null;
    historySec.addEventListener("mouseenter", () => {
      if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
      historyList.classList.add("open");
      historyToggle.textContent = "Recent ▾";
    });
    historySec.addEventListener("mouseleave", () => {
      hideTimer = setTimeout(() => {
        historyList.classList.remove("open");
        historyToggle.textContent = "Recent ▸";
      }, 200);
    });

    // Refresh button: force re-sort
    document.getElementById("refreshBtn").addEventListener("click", () => {
      window.hive.getSessions().then(data => render(data, true));
    });

    // Initial load: sort
    window.hive.getSessions().then(data => render(data, true));

    // Live updates: use forceSort flag if sent, otherwise stable order
    window.hive.onSessionsUpdate(data => render(data, !!data.forceSort));
  </script>
</body>
</html>
